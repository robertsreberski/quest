name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    name: node ${{ matrix.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero-dependency project: no install step, no lockfile — run directly.
      - name: Tests
        run: npm test

      - name: Hygiene (project-agnostic content)
        run: node scripts/check-hygiene.mjs

      - name: Validate plugin manifests
        run: node scripts/validate-manifests.mjs

      - name: Agent / skill parity
        run: npm run check:parity

      - name: Shellcheck (only if shell scripts exist)
        run: |
          scripts=$(find . \( -path ./node_modules -o -path ./.git \) -prune -o -name '*.sh' -print)
          if [ -n "$scripts" ]; then
            echo "Linting shell scripts:"
            echo "$scripts"
            echo "$scripts" | xargs shellcheck
          else
            echo "No shell scripts found; skipping shellcheck."
          fi

  secrets:
    runs-on: ubuntu-latest
    name: secret scan (gitleaks)
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
